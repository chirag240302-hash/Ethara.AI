name: Init DB
on:
  workflow_dispatch: {}

jobs:
  init:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Init database (prisma db push + seed)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # If your seed requires AUTH_SECRET, add it to repo secrets and uncomment below
          # AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
        run: |
          npm run db:push
          npm run db:seed
